# GitHub Pages デプロイ（＋手動実行時のみ価格収集を試行）
#   push(main)        … data/やコード更新時に build & deploy（スクレイピングはしない）
#   workflow_dispatch … 手動実行（Actionsタブのボタン）
#
# 注: 日次の価格収集は駿河屋がGitHubのデータセンターIPを弾くためクラウドでは取得できない。
#     収集は自宅Macの launchd（scripts/daily-update.sh）で行い data/ を push する運用。
#     そのため schedule(cron) トリガーは廃止（毎日4h43mかけて0件になる無駄実行を回避）。
name: Daily price update & deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

# GITHUB_TOKEN の権限: 履歴コミット(contents) と Pages デプロイ(pages,id-token)
permissions:
  contents: write
  pages: write
  id-token: write

# デプロイの同時実行を防ぐ（実行中のものは止めない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # 駿河屋がGitHubのIPを絞ると収集が長引くため、暴走(6h上限近く)を防ぐ安全網
    timeout-minutes: 180
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --- 価格収集（パック一括。schedule / 手動実行のときだけ） ---
      # マスター(data/cards)更新＋当日の販売価格をパック別履歴(data/history)に追記
      # 収集が失敗/長引いても既存データでビルド&デプロイは続行する（サイトを止めない）
      - name: Collect prices (all packs)
        if: github.event_name != 'push'
        run: npm run collect
        continue-on-error: true
        timeout-minutes: 90

      # 買取価格（商品単位ページ。販売価格が高いカードに限定して取得）
      - name: Collect buy prices
        if: github.event_name != 'push'
        run: npm run collect:buy
        continue-on-error: true
        timeout-minutes: 60

      - name: Commit updated data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cards data/history
          if git diff --staged --quiet; then
            echo "価格データの変更なし"
          else
            git commit -m "chore: update card prices ($(date -u +%Y-%m-%d))"
            git push
          fi

      # --- ビルド（最新価格で静的HTML再生成） ---
      - name: Build
        run: npm run build

      # --- GitHub Pages へデプロイ ---
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # Pages側の一時的失敗（syncing_files で "try again later"）に備えたリトライ。
      # 1回目は失敗しても続行し、失敗時のみ30秒待って再デプロイする。
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before deploy retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
